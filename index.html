<!DOCTYPE html>
<html lang="vi">
<head> <!--First demo website how to use html, css, javascript-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Online</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f6fa;
        }

        header {
            background: #2f3640;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            font-weight: 600;
        }

        .cart-icon {
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            padding: 30px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-card h4 {
            margin: 10px 0;
        }

        .price {
            color: #e84118;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #0984e3;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0652DD;
        }

        .cart {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .cart h3 {
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .cart-total {
            margin-top: 15px;
            font-weight: bold;
        }

        .quantity-btn {
            background: #dcdde1;
            color: black;
            padding: 3px 7px;
            margin: 0 3px;
        }

        .remove-btn {
            background: #e84118;
            padding: 3px 7px;
            font-size: 12px;
        }

        @media(max-width: 768px){
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h2>🛒 HUY SHOP</h2>
    <div class="cart-icon">Giỏ hàng (<span id="cart-count">0</span>)</div>
</header>

<div class="container">

    <div class="products" id="product-list"></div>

    <div class="cart">
        <h3>Giỏ hàng</h3>
        <div id="cart-items"></div>
        <div class="cart-total">
            Tổng: <span id="total-price">0</span> đ
        </div>
    </div>

</div>

<script>
    const products = [
        { id: 1, name: "Áo thun nam", price: 200000, img: "https://picsum.photos/300?1" },
        { id: 2, name: "Giày sneaker", price: 750000, img: "https://picsum.photos/300?2" },
        { id: 3, name: "Túi xách", price: 500000, img: "https://picsum.photos/300?3" },
        { id: 4, name: "Đồng hồ", price: 1200000, img: "https://picsum.photos/300?4" },
        { id: 5, name: "Tai nghe", price: 350000, img: "https://picsum.photos/300?5" }
    ];

    let cart = [];

    const productList = document.getElementById("product-list");
    const cartItems = document.getElementById("cart-items");
    const totalPrice = document.getElementById("total-price");
    const cartCount = document.getElementById("cart-count");

    function renderProducts(){
        productList.innerHTML = "";
        products.forEach(p => {
            productList.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <div class="price">${p.price.toLocaleString()} đ</div>
                    <button onclick="addToCart(${p.id})">Thêm vào giỏ</button>
                </div>
            `;
        });
    }

    function addToCart(id){
        const product = products.find(p => p.id === id);
        const item = cart.find(i => i.id === id);

        if(item){
            item.quantity++;
        } else {
            cart.push({...product, quantity:1});
        }
        updateCart();
    }

    function updateCart(){
        cartItems.innerHTML = "";
        let total = 0;
        let count = 0;

        cart.forEach(item => {
            total += item.price * item.quantity;
            count += item.quantity;

            cartItems.innerHTML += `
                <div class="cart-item">
                    <div>
                        ${item.name}
                        <br>
                        <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                        ${item.quantity}
                        <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        <button class="remove-btn" onclick="removeItem(${item.id})">x</button>
                    </div>
                    <div>${(item.price * item.quantity).toLocaleString()} đ</div>
                </div>
            `;
        });

        totalPrice.innerText = total.toLocaleString();
        cartCount.innerText = count;
    }

    function changeQuantity(id, amount){
        const item = cart.find(i => i.id === id);
        if(item){
            item.quantity += amount;
            if(item.quantity <= 0){
                cart = cart.filter(i => i.id !== id);
            }
            updateCart();
        }
    }

    function removeItem(id){
        cart = cart.filter(i => i.id !== id);
        updateCart();
    }

    renderProducts();
</script>

</body>
</html>
